name: Update Project Showcase

on:
   workflow_dispatch:
   schedule:
      - cron: "0 6 * * *"

permissions:
   contents: write

jobs:
   showcase:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Generate Showcase
           uses: actions/github-script@v7
           with:
              github-token: ${{ secrets.GITHUB_TOKEN }}
              script: |
                 const fs = require("fs");

                 const username = "KavehKhorshidiii";

                 const repos = await github.paginate(
                   github.rest.repos.listForUser,
                   {
                     username: username,
                     per_page: 100
                   }
                 );

                 const projects = repos.filter(repo =>
                   repo.topics.includes("showcase")
                 );

                 let content = "## 🚀 My Projects\n\n";

                 for (const repo of projects) {
                   content += "### [" + repo.name + "](" + repo.html_url + ")\n\n";
                   content += (repo.description || "No description") + "\n\n";
                   content += "⭐ " + repo.stargazers_count + " stars\n\n";
                 }

                 const readme = fs.readFileSync("README.md", "utf8");

                 const start = "<!-- SHOWCASE-START -->";
                 const end = "<!-- SHOWCASE-END -->";

                 const newReadme = readme.replace(
                   new RegExp(start + "[\\s\\S]*?" + end),
                   start + "\n\n" + content + "\n" + end
                 );

                 fs.writeFileSync("README.md", newReadme);
